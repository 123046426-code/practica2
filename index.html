<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Cafetería - Sistema Integrado</title>
  <!-- Iconos Tabler -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <!-- Estilos propios -->
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>

  <h1><i class="ti ti-coffee"></i> La Cafetería</h1>

  <!-- Navegación principal -->
  <nav>
    <button class="nav-btn active" id="tab-pedidos" onclick="mostrarVista('pedidos')">
      <i class="ti ti-receipt"></i> Pedidos (Caja)
    </button>
    <button class="nav-btn" id="tab-productos" onclick="mostrarVista('productos')">
      <i class="ti ti-chef-hat"></i> Cocina
    </button>
    <button class="nav-btn" id="tab-nuevo-pedido" onclick="mostrarVista('nuevo-pedido')">
      <i class="ti ti-plus"></i> Nuevo pedido
    </button>
    <button class="nav-btn" onclick="iniciarModoCliente()">
      <i class="ti ti-user"></i> Cliente (consola)
    </button>
  </nav>

  <!-- Vista: Pedidos (Caja) -->
  <div id="view-pedidos" class="view active">
    <div class="stat-grid" id="stats-grid"></div>
    <div class="filter-bar">
      <button class="filter-btn active" onclick="filtrarPedidos('todos', this)">Todos</button>
      <button class="filter-btn" onclick="filtrarPedidos('pendiente', this)">Pendientes</button>
      <button class="filter-btn" onclick="filtrarPedidos('en-preparacion', this)">En preparación</button>
      <button class="filter-btn" onclick="filtrarPedidos('listo', this)">Listos</button>
      <button class="filter-btn" onclick="filtrarPedidos('cancelado', this)">Cancelados</button>
    </div>
    <div id="lista-pedidos"></div>
    <div id="total-acumulado-caja" class="total-box">Total acumulado: $0.00</div>
  </div>

  <!-- Vista: Productos (Cocina) -->
  <div id="view-productos" class="view">
    <div style="display: flex; justify-content: space-between; flex-wrap: wrap; gap: 1rem; margin-bottom: 1rem;">
      <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
        <input type="text" id="buscar-prod" placeholder="Buscar producto..." oninput="renderizarProductos()" style="padding: 0.5rem; border: 1px solid var(--borde); border-radius: 8px;">
        <select id="filtro-cat" onchange="renderizarProductos()" style="padding: 0.5rem; border: 1px solid var(--borde); border-radius: 8px;">
          <option value="">Todas las categorías</option>
        </select>
      </div>
      <button class="btn" onclick="abrirModal(null)"><i class="ti ti-plus"></i> Agregar producto</button>
    </div>
    <table>
      <thead>
        <tr><th>Producto</th><th>Categoría</th><th>Precio</th><th>Stock</th><th>Estado</th><th>Acciones</th></tr>
      </thead>
      <tbody id="prod-tbody"></tbody>
    </table>
  </div>

  <!-- Vista: Nuevo pedido -->
  <div id="view-nuevo-pedido" class="view">
    <div class="card">
      <h2>Crear nuevo pedido</h2>
      <div class="form-group">
        <label>Mesa / Cliente</label>
        <input type="text" id="pedido-mesa" placeholder="Ej: Mesa 3 o Juan R.">
      </div>
      <div class="form-group">
        <label>Notas</label>
        <input type="text" id="pedido-notas" placeholder="Sin azúcar, para llevar...">
      </div>
      <div style="margin-bottom: 1rem;">
        <strong>Selecciona productos:</strong>
        <div id="item-picker" style="margin-top: 0.5rem;"></div>
      </div>
      <div id="seleccion-actual" style="margin-bottom: 1rem;"></div>
      <div style="display: flex; gap: 0.5rem;">
        <button class="btn" onclick="crearPedido()"><i class="ti ti-check"></i> Crear pedido</button>
        <button class="btn btn-danger" onclick="limpiarNuevoPedido()"><i class="ti ti-x"></i> Limpiar</button>
      </div>
    </div>
  </div>

  <!-- Modal de producto -->
  <div id="modal-producto" class="modal-overlay">
    <div class="modal">
      <h2 id="modal-titulo">Agregar producto</h2>
      <input type="hidden" id="edit-id">
      <div class="form-group"><label>Nombre</label><input type="text" id="p-nombre"></div>
      <div class="form-group"><label>Categoría</label><select id="p-cat"></select></div>
      <div class="form-group"><label>Precio</label><input type="number" id="p-precio" step="0.01"></div>
      <div class="form-group"><label>Stock</label><input type="number" id="p-stock"></div>
      <div class="form-group"><label>Descripción</label><input type="text" id="p-desc"></div>
      <div class="form-group"><label>Estado</label><select id="p-estado"><option value="activo">Activo</option><option value="inactivo">Inactivo</option></select></div>
      <div class="form-actions">
        <button class="btn btn-danger" onclick="cerrarModal()">Cancelar</button>
        <button class="btn" onclick="guardarProducto()">Guardar</button>
      </div>
    </div>
  </div>

  <!-- Confirmación de eliminación -->
  <div id="confirm-overlay" class="confirm-overlay">
    <div class="confirm-box">
      <p>¿Eliminar este producto permanentemente?</p>
      <div style="margin-top: 1rem; display: flex; gap: 0.5rem; justify-content: center;">
        <button class="btn" onclick="cerrarConfirmacion()">Cancelar</button>
        <button class="btn btn-danger" onclick="confirmarEliminar()">Eliminar</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <!-- Carga de scripts en orden -->
  <script src="modulos/datos.js"></script>
  <script src="modulos/cocina.js"></script>
  <script src="modulos/caja.js"></script>
  <script src="modulos/cliente.js"></script>

  <!-- Inicialización -->
  <script>
    (function() {
      // Llenar categorías en filtro de Cocina
      const catFilter = document.getElementById("filtro-cat");
      if (catFilter) {
        catFilter.innerHTML = '<option value="">Todas las categorías</option>' +
          config.categorias.map(c => `<option value="${c}">${c}</option>`).join("");
      }
      // Mostrar vista inicial de pedidos
      mostrarVista("pedidos");
    })();
  </script>
</body>
</html>
