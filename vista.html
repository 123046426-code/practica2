<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Caja</title>

</head>

<body>

<h1>Sistema Caja</h1>

<h2>Agregar producto al pedido</h2>

<input
type="text"
id="producto"
placeholder="Producto">

<input
type="number"
id="precio"
placeholder="Precio">

<button
onclick="agregarProductoPedido()">

Agregar producto

</button>


<h2>Pedido actual</h2>

<ul id="pedidoActual">

</ul>

<h3 id="subtotal">

Subtotal: $0

</h3>


<button
onclick="generarPedido()">

Confirmar pedido

</button>


<hr>

<h2>Pedidos realizados</h2>

<ul id="listaPedidos">

</ul>

<h2 id="total">

Total acumulado: $0

</h2>


<script src="modulos/caja.js"></script>

</body>

</html>
